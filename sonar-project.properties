# SonarCloud configuration for the full monorepo
# https://sonarcloud.io/project/overview?id=aruanoguate_file-tree-size

sonar.projectKey=aruanoguate_file-tree-size
sonar.organization=aruanoguate

sonar.sources=packages/tree-size-core/src,packages/json-tree-size/src,packages/xml-tree-size/src
sonar.tests=packages/tree-size-core/tests,packages/json-tree-size/tests,packages/xml-tree-size/tests

# Exclude generated or external artifacts from source analysis:
# - dist: compiled bundles, not source of record
# - node_modules: third-party dependencies
# - coverage: generated test reports
# - *.vsix: packaged extension archives
sonar.exclusions=\
	**/dist/**,\
	**/node_modules/**,\
	**/coverage/**,\
	**/*.vsix

# Exclude intentional duplication from copy-paste detection:
# - packages/**/tests/**: mirrored JSON/XML/core tests assert shared behavior across products
# - */src/extension.ts: thin command-registration wrappers that differ only by product wiring
# - */src/panel.ts: intentionally parallel panel shells around format-specific parser inputs
# - tree-size-core/src/webview/main.ts: shared webview implementation imported by both extensions
sonar.cpd.exclusions=\
	packages/**/tests/**,\
	packages/json-tree-size/src/extension.ts,\
	packages/xml-tree-size/src/extension.ts,\
	packages/json-tree-size/src/panel.ts,\
	packages/xml-tree-size/src/panel.ts,\
	packages/tree-size-core/src/webview/main.ts

# Exclude files that are either browser-entry wrappers or declaration/barrel files from coverage:
# - */src/webview/main.ts: browser bootstraps exercised indirectly and not meaningful for line coverage
# - */src/types.ts: type-only re-export surfaces with no runtime behavior
# - tree-size-core/src/index.ts: barrel file that only re-exports shared modules
sonar.coverage.exclusions=\
	packages/json-tree-size/src/webview/main.ts,\
	packages/json-tree-size/src/types.ts,\
	packages/xml-tree-size/src/webview/main.ts,\
	packages/xml-tree-size/src/types.ts,\
	packages/tree-size-core/src/index.ts,\
	packages/tree-size-core/src/types.ts,\
	packages/tree-size-core/src/webview/main.ts

sonar.javascript.lcov.reportPaths=packages/tree-size-core/coverage/lcov.info,packages/json-tree-size/coverage/lcov.info,packages/xml-tree-size/coverage/lcov.info
sonar.sourceEncoding=UTF-8