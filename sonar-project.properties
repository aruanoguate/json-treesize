# SonarCloud configuration for the full monorepo
# https://sonarcloud.io/project/overview?id=aruanoguate_file-tree-size

sonar.projectKey=aruanoguate_file-tree-size
sonar.organization=aruanoguate

sonar.sources=packages/tree-size-core/src,packages/json-tree-size/src,packages/xml-tree-size/src
sonar.tests=packages/tree-size-core/tests,packages/json-tree-size/tests,packages/xml-tree-size/tests
sonar.exclusions=**/dist/**,**/node_modules/**,**/coverage/**,**/*.vsix

# Coverage exclusions — browser-only entrypoints and pure barrel/type files
sonar.coverage.exclusions=packages/json-tree-size/src/webview/main.ts,packages/json-tree-size/src/types.ts,packages/xml-tree-size/src/webview/main.ts,packages/xml-tree-size/src/types.ts,packages/tree-size-core/src/index.ts,packages/tree-size-core/src/types.ts,packages/tree-size-core/src/webview/main.ts

sonar.javascript.lcov.reportPaths=packages/tree-size-core/coverage/lcov.info,packages/json-tree-size/coverage/lcov.info,packages/xml-tree-size/coverage/lcov.info
sonar.sourceEncoding=UTF-8