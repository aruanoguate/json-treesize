name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: Analyze
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate blame / new-code detection

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/json-tree-size/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/json-tree-size

      - name: Run tests with coverage
        run: npx jest --coverage --ci
        working-directory: packages/json-tree-size

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: packages/json-tree-size
          args: >
            -Dsonar.projectKey=aruanoguate_file-tree-size
            -Dsonar.organization=aruanoguate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
