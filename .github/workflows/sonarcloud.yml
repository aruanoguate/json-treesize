name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: Analyze
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate blame / new-code detection

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tree-size-core tests with coverage
        run: npm --prefix packages/tree-size-core run test -- --coverage --ci

      - name: Run JSON tests with coverage
        run: npm --prefix packages/json-tree-size run test -- --coverage --ci

      - name: Run XML tests with coverage
        run: npm --prefix packages/xml-tree-size run test -- --coverage --ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
