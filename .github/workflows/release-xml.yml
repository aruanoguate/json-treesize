name: Release XML Extension

on:
  push:
    tags:
      - 'xml-v*'

permissions:
  contents: write

jobs:
  release:
    name: Package & Publish XML
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run XML tests
        run: npm --prefix packages/xml-tree-size run test -- --ci

      - name: Compile XML extension
        run: npm --prefix packages/xml-tree-size run compile

      - name: Package XML VSIX
        run: npm --prefix packages/xml-tree-size run package -- --out xml-tree-size.vsix

      - name: Publish XML to VS Code Marketplace
        run: npx @vscode/vsce publish --no-yarn --packagePath xml-tree-size.vsix
        working-directory: packages/xml-tree-size

      - name: Publish XML to Open VSX Registry
        if: env.OVSX_PAT != ''
        run: npx ovsx publish xml-tree-size.vsix
        working-directory: packages/xml-tree-size

      - name: Create XML GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: XML Tree Size ${{ github.ref_name }}
          files: packages/xml-tree-size/xml-tree-size.vsix
          generate_release_notes: true
