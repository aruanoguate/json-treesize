name: Release JSON Extension

on:
  push:
    tags:
      - 'json-v*'

permissions:
  contents: write

jobs:
  release:
    name: Package & Publish JSON
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run JSON tests
        run: npm --prefix packages/json-tree-size run test -- --ci

      - name: Compile JSON extension
        run: npm --prefix packages/json-tree-size run compile

      - name: Package JSON VSIX
        run: npm --prefix packages/json-tree-size run package -- --out json-tree-size.vsix
        working-directory: packages/json-tree-size

      - name: Publish JSON to VS Code Marketplace
        run: npx @vscode/vsce publish --no-yarn --packagePath json-tree-size.vsix
        working-directory: packages/json-tree-size

      - name: Publish JSON to Open VSX Registry
        if: env.OVSX_PAT != ''
        run: npx ovsx publish json-tree-size.vsix
        working-directory: packages/json-tree-size

      - name: Create JSON GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: JSON Tree Size ${{ github.ref_name }}
          files: packages/json-tree-size/json-tree-size.vsix
          generate_release_notes: true