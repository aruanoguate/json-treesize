<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" ry="32" fill="url(#bg)"/>

  <!-- Angle bracket < on the left -->
  <g transform="translate(38, 56)">
    <polyline points="42,0 0,36 42,72"
              fill="none" stroke="#e8832a" stroke-width="12"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Horizontal bars (tree-size visualization) -->
  <g opacity="0.9">
    <!-- Bar 1 - longest -->
    <rect x="92" y="68" width="110" height="14" rx="4" fill="#e8832a"/>
    <!-- Bar 2 - medium -->
    <rect x="92" y="96" width="80" height="14" rx="4" fill="#e8832a" opacity="0.78"/>
    <!-- Bar 3 - shorter -->
    <rect x="92" y="124" width="55" height="14" rx="4" fill="#e8832a" opacity="0.58"/>
    <!-- Bar 4 - short -->
    <rect x="92" y="152" width="35" height="14" rx="4" fill="#e8832a" opacity="0.42"/>
  </g>

  <!-- Angle bracket > on the right -->
  <g transform="translate(176, 56)">
    <polyline points="0,0 42,36 0,72"
              fill="none" stroke="#e8832a" stroke-width="12"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Slash / between brackets (XML closing tag feel) -->
  <line x1="140" y1="180" x2="116" y2="216"
        stroke="#e8832a" stroke-width="8"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Small < > under bars for XML emphasis -->
  <g opacity="0.6">
    <polyline points="108,194 94,206 108,218"
              fill="none" stroke="#e8832a" stroke-width="6"
              stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="148,194 162,206 148,218"
              fill="none" stroke="#e8832a" stroke-width="6"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
