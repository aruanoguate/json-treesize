<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- Background (same as JSON icon) -->
  <rect width="256" height="256" rx="32" ry="32" fill="url(#bg)"/>

  <!-- Horizontal bars — left side, matching JSON icon layout -->
  <rect x="36" y="56"  width="120" height="16" rx="4" fill="#e8832a"/>
  <rect x="36" y="84"  width="96"  height="16" rx="4" fill="#e8832a" opacity="0.82"/>
  <rect x="36" y="112" width="72"  height="16" rx="4" fill="#e8832a" opacity="0.62"/>
  <rect x="36" y="140" width="48"  height="16" rx="4" fill="#e8832a" opacity="0.44"/>

  <!-- Angle bracket  >  — right side, mirrors JSON curly brace position -->
  <polyline points="170,52 220,104 170,156"
            fill="none" stroke="#e8832a" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small  </> tag — bottom center, subtle XML identity -->
  <g opacity="0.55" transform="translate(72, 176)">
    <polyline points="24,0 8,20 24,40"
              fill="none" stroke="#e8832a" stroke-width="7"
              stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="52" y1="0" x2="40" y2="40"
          stroke="#e8832a" stroke-width="7"
          stroke-linecap="round"/>
    <polyline points="68,0 84,20 68,40"
              fill="none" stroke="#e8832a" stroke-width="7"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
