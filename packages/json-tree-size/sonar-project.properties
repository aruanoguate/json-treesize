# SonarCloud configuration
# https://sonarcloud.io/project/overview?id=aruanoguate_file-tree-size

sonar.projectKey=aruanoguate_file-tree-size
sonar.organization=aruanoguate

sonar.sources=src
sonar.tests=tests
sonar.exclusions=dist/**,node_modules/**,*.vsix

# Coverage exclusions — browser-only webview code (no Node.js DOM) and pure type declarations
sonar.coverage.exclusions=src/webview/main.ts,src/types.ts

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
